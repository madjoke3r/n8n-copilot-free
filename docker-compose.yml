# Generated by setup.sh — do not edit by hand.
# To regenerate, edit config.env and re-run setup.sh.

services:

  postgres:
    image: postgres:15-alpine
    container_name: n8n-postgres
    command: postgres -c max_connections=200
    environment:
      POSTGRES_USER: ${DB_USER:-n8n}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme123}
      POSTGRES_DB: ${DB_NAME:-n8n}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ CMD-SHELL, "pg_isready -U ${DB_USER:-n8n}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - n8n-net

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${DB_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${DB_PASSWORD:-changeme123}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_PROXY_HOPS: 1
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-http://localhost:5678}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678/webhook}
      WEBHOOK_TUNNEL_URL: ${WEBHOOK_URL:-http://localhost:5678/webhook}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_USER_MANAGEMENT_JWT_SECRET: ${JWT_SECRET}
      N8N_DEFAULT_USER_PASSWORD: ${ADMIN_PASSWORD:-Change@Me123}
      N8N_LOG_LEVEL: info
      N8N_LOG_OUTPUT: console
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE:-false}
      N8N_PUSH_BACKEND: websocket
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "${N8N_PORT:-5678}:5678"
    healthcheck:
      test: [ CMD, wget, --quiet, --tries=1, --spider, "http://localhost:5678/healthz" ]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - n8n-net

  copilot-api:
    image: node:22-alpine
    container_name: copilot-api
    working_dir: /app
    command: >
      sh -c "npm install -g copilot-api@${COPILOT_API_VERSION:-0.7.0} --silent 2>/dev/null;
             exec copilot-api start --port 4141"
    ports:
      - "${COPILOT_API_PORT:-4141}:4141"
    volumes:
      - copilot_data:/root/.local/share/copilot-api
    restart: unless-stopped
    networks:
      - n8n-net

  copilot-shim:
    image: node:22-alpine
    container_name: copilot-shim
    working_dir: /app
    command: node responses-shim.js
    ports:
      - "${COPILOT_SHIM_PORT:-4142}:4142"
    volumes:
      - ./responses-shim.js:/app/responses-shim.js:ro
    environment:
      UPSTREAM_HOST: copilot-api
      UPSTREAM_PORT: "4141"
      LISTEN_PORT: "4142"
    depends_on:
      - copilot-api
    restart: unless-stopped
    networks:
      - n8n-net

volumes:
  postgres_data:
  n8n_data:
  copilot_data:


networks:
  n8n-net:
    driver: bridge
